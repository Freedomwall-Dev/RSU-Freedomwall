<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact FreedomWall</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body>
    <!-- Main Layout -->
    <div class="container">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <div class="logo">
                    <h1>RSU FreedomWall</h1>
                </div>
            </div>
            <nav class="nav">
                <ul>
                    <li><a href="index.html"><i class="fas fa-home"></i> Home</a></li>
                    <li><a href="about.html"><i class="fas fa-info-circle"></i> About</a></li>
                    <li><a href="contact.html" class="active"><i class="fas fa-envelope"></i> Contact</a></li>
                </ul>
            </nav>
            <div class="sidebar-footer">
                <button id="themeToggle" class="btn btn-icon">
                    <i class="fas fa-moon"></i> Dark Mode
                </button>
                <button id="postNoteBtn" class="btn" onclick="window.location.href='index.html'">
                    <i class="fas fa-plus"></i> Post a Note
                </button>
            </div>
        </aside>

        <!-- Mobile Header -->
        <header class="mobile-header">
            <button id="menuToggle" class="btn btn-icon">
                <i class="fas fa-bars"></i>
            </button>
            <h1>Contact Us</h1>
            <button id="mobilePostBtn" class="btn btn-icon" onclick="window.location.href='index.html'">
                <i class="fas fa-plus"></i>
            </button>
        </header>

        <!-- Main Content -->
        <main class="main-content">
            <div class="page-content">
                <h2>Contact FreedomWall</h2>
                <p>Have questions, suggestions, or feedback? Reach out to us through these channels:</p>
                
                <div class="contact-methods">
                    <div class="contact-card">
                        <i class="fab fa-facebook"></i>
                        <h3>Facebook</h3>
                        <p>Connect with us on Facebook:</p>
                        <a href="https://www.facebook.com/profile.php?id=61579103934265" target="_blank">
                            FreedomWall Facebook Page
                        </a>
                    </div>
                    
                    <div class="contact-card">
                        <i class="fas fa-envelope"></i>
                        <h3>Email</h3>
                        <p>Send us an email at:</p>
                        <a href="mailto:freedomwallwebsite@gmail.com">
                            freedomwallwebsite@gmail.com
                        </a>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script src="js/theme.js"></script>
</body>
</html>
